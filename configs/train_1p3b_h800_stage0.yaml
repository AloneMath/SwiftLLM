data:
  data_dir: ./base_data
  tokenizer_path: ./artifacts/tokenizer
  shard_prefix: shard_
  train_shards: 8
  val_shard_index: 8
  text_column: text
  token_cache_dir: ./artifacts/token_cache_8shards

model:
  vocab_size: 50257
  n_layers: 24
  n_heads: 16
  n_kv_heads: 8
  d_model: 2048
  d_ff: 5632
  max_seq_len: 2048
  rope_theta: 10000.0
  dropout: 0.0
  use_conditional_memory: false
  memory_slots: 64
  memory_k: 4

train:
  run_name: swiftllm_1p3b_h800_stage0
  device: cuda
  seed: 42
  compute_dtype: bfloat16
  num_steps: 40000
  lr: 0.0002
  min_lr: 0.00002
  warmup_steps: 1000
  weight_decay: 0.1
  optimizer: adamw
  adam_beta1: 0.9
  adam_beta2: 0.95
  attention_backend: flash
  grad_clip: 1.0
  micro_batch_size: 1
  grad_accum_steps: 8
  max_seq_len: 2048
  eval_every: 1000
  eval_batches: 8
  log_every: 10
  save_every: 1000
  compile_model: true
  compile_mode: default
  gradient_checkpointing: true
  distributed: true
  dist_backend: nccl
  ddp_find_unused_parameters: false
  dist_timeout_sec: 1800
  checkpoint_dir: ./checkpoints/swiftllm_1p3b_h800_stage0

targets:
  target_val_bpb: 0.7180
  target_core: 0.2565
  target_hours: 72.0

benchmark:
  enable_core_eval: false
  core_every: 5000
  core_max_per_task: 100
  core_bundle_path: ""
